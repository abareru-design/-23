<!DOCTYPE html>
<html>
<body>

<h1>税金ゲーム</h1>

<p id="money">1000円</p>

<button onclick="earn()">働く</button>
<button onclick="tax()">納税</button>

<script>
let money = 1000;

function earn() {
  money += 500;
  update();
}

function tax() {
  money -= 300;
  update();
}

function update() {
  document.getElementById("money").innerText = money + "円";
}
</script>

</body>
</html>
